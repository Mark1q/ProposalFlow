name: API Integration Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Create .env file for Docker
      - name: Create .env file
        run: |
          echo "NODE_ENV=test" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=proposalflow" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          echo "PORT=3000" >> .env
          echo "ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}" >> .env
          echo "REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}" >> .env


      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          timeout 60s bash -c 'until curl --silent --fail --output /dev/null http://localhost:3000/health; do sleep 2; done'

      - name: Install Newman
        run: npm install -g newman
      
      - name: Run Postman Collection
        run: |
          newman run server/tests/postman/collection.json \
          -e server/tests/postman/environment.json \
          --reporters cli
          
      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs api