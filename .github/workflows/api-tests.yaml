name: API Integration Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Create .env file for Docker
      - name: Create .env files
        run: |
          echo "${{ secrets.SERVER_ENV_TEST }} >> ./server/.env"
          echo "${{ secrets.GOOGLE_API_KEY }} >> ./ai-service/.env"

      - name: Start containers
        run: docker compose up -d api worker-proposal worker-auth --build

      - name: Wait for API to be ready
        run: |
          timeout 60s bash -c 'until curl --silent --fail --output /dev/null http://localhost:3000/health; do sleep 2; done'

      - name: Install Newman
        run: npm install -g newman
      
      - name: Run Postman Collection
        run: |
          newman run server/tests/postman/collection.json \
          -e server/tests/postman/environment.json \
          --reporters cli
          
      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs api